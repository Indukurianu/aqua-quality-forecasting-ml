<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign In - Water Quality AI System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#fff;
overflow:hidden;
}

/* GLOW EFFECT */
body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#00c6ff55,transparent);
top:-120px;
left:-120px;
}

body::after{
content:'';
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,#00f26055,transparent);
bottom:-120px;
right:-120px;
}

/* CARD */
.card{
position:relative;
z-index:1;
width:400px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
box-shadow:0 15px 40px rgba(0,0,0,0.5);
animation:fadeIn 1s ease-in-out;
}

/* TITLE */
h2{
text-align:center;
margin-bottom:20px;
font-weight:600;
background:linear-gradient(90deg,#00f260,#0575e6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.15);
color:#fff;
outline:none;
}

input::placeholder{
color:#ddd;
}

/* BUTTON */
button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#00f260,#0575e6);
color:#fff;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* LINKS */
.link{
text-align:center;
margin-top:15px;
font-size:14px;
color:#ccc;
}

.link a{
color:#00c6ff;
text-decoration:none;
}

.link a:hover{
text-decoration:underline;
}

/* FLASH */
.flash{
background:rgba(255,77,109,0.2);
border-left:4px solid #ff4d6d;
padding:10px;
border-radius:8px;
margin-bottom:10px;
font-size:14px;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="card">

<h2>🔐 Secure Sign In</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for cat, msg in messages %}
<div class="flash">{{ msg }}</div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="post">

<input type="email" name="email" placeholder="📧 Email Address" required>

<input type="password" name="password" placeholder="🔑 Password" required>

<button type="submit">Sign In</button>

</form>

<p class="link">New user? <a href="{{ url_for('signup') }}">Create Account</a></p>
<p class="link"><a href="{{ url_for('home') }}">← Back to Home</a></p>

</div>

</body>
</html>
